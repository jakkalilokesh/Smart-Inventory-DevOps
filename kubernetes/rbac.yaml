# =============================================================================
# RBAC - Role-Based Access Control for SmartInventory
# =============================================================================
# Principle of Least Privilege: Each component gets only the permissions
# it needs. No cluster-admin roles for application workloads.
# =============================================================================
---
# --- Service Account for the Application ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: smartinventory-sa
  namespace: smartinventory-prod
  labels:
    app.kubernetes.io/name: smartinventory
    app.kubernetes.io/component: backend
  annotations:
    # Disable automatic token mounting for security
    # Tokens are only mounted when explicitly needed
    eks.amazonaws.com/role-arn: "arn:aws:iam::role/smartinventory-pod-role"
automountServiceAccountToken: false
---
# --- Application Role (namespace-scoped) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smartinventory-app-role
  namespace: smartinventory-prod
  labels:
    app.kubernetes.io/name: smartinventory
rules:
  # Allow reading ConfigMaps for application configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["smartinventory-config"]
  # Allow reading Secrets for database credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["smartinventory-secrets"]
---
# --- Bind Role to Service Account ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smartinventory-app-rolebinding
  namespace: smartinventory-prod
  labels:
    app.kubernetes.io/name: smartinventory
subjects:
  - kind: ServiceAccount
    name: smartinventory-sa
    namespace: smartinventory-prod
roleRef:
  kind: Role
  name: smartinventory-app-role
  apiGroup: rbac.authorization.k8s.io
---
# --- CI/CD Deployer Service Account (used by ArgoCD) ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-deployer-sa
  namespace: smartinventory-prod
  labels:
    app.kubernetes.io/name: smartinventory
    app.kubernetes.io/component: cicd
automountServiceAccountToken: true
---
# --- Deployer Role - Limited deployment permissions ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer-role
  namespace: smartinventory-prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "pods", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer-rolebinding
  namespace: smartinventory-prod
subjects:
  - kind: ServiceAccount
    name: argocd-deployer-sa
    namespace: smartinventory-prod
roleRef:
  kind: Role
  name: deployer-role
  apiGroup: rbac.authorization.k8s.io
---
# --- Monitoring Service Account (Prometheus) ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: monitoring
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-cluster-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-cluster-rolebinding
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus-cluster-role
  apiGroup: rbac.authorization.k8s.io
