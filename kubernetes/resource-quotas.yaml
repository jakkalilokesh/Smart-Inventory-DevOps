# =============================================================================
# Resource Quotas and Limit Ranges per Environment
# =============================================================================
---
# --- Production Resource Quota ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: smartinventory-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "50"
    services: "20"
    secrets: "30"
    configmaps: "30"
    persistentvolumeclaims: "10"
---
# --- Production Limit Range ---
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: smartinventory-prod
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "4"
        memory: "8Gi"
---
# --- Dev Resource Quota (smaller) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: smartinventory-dev
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
    services: "10"
---
# --- Staging Resource Quota ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: smartinventory-staging
spec:
  hard:
    requests.cpu: "6"
    requests.memory: "12Gi"
    limits.cpu: "12"
    limits.memory: "24Gi"
    pods: "30"
    services: "15"
