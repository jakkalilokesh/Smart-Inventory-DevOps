# =============================================================================
# Checkov Configuration - Infrastructure as Code Security Scanner
# =============================================================================
# Purpose: Scan Terraform, Kubernetes, Dockerfile, and Helm for misconfigs.
# Integration: Runs after container scanning in Jenkins pipeline.
# Fail Criteria: CRITICAL/HIGH misconfiguration fails the build.
# =============================================================================

framework:
  - terraform
  - kubernetes
  - dockerfile
  - helm

directory:
  - "terraform/"
  - "k8s/"
  - "kubernetes/"
  - "helm/"
  - "Dockerfile"

output:
  - cli
  - json
  - junitxml

output-file-path: "checkov-report"

check:
  # Terraform AWS checks
  - CKV_AWS_19    # S3 bucket encryption
  - CKV_AWS_21    # S3 bucket versioning
  - CKV_AWS_24    # No unrestricted SSH
  - CKV_AWS_41    # RDS encryption at rest
  - CKV_AWS_58    # EKS cluster encryption
  # Kubernetes checks
  - CKV_K8S_1     # No privileged containers
  - CKV_K8S_2     # No privilege escalation
  - CKV_K8S_3     # Capability drop
  - CKV_K8S_5     # Liveness probe required
  - CKV_K8S_8     # Readiness probe required
  - CKV_K8S_10    # CPU requests
  - CKV_K8S_11    # CPU limits
  - CKV_K8S_12    # Memory requests
  - CKV_K8S_13    # Memory limits
  - CKV_K8S_14    # Image tag
  - CKV_K8S_20    # Run as non-root
  - CKV_K8S_22    # Read-only filesystem
  - CKV_K8S_25    # Container security context
  - CKV_K8S_37    # No privilege escalation
  - CKV_K8S_40    # Container resources set
  # Dockerfile checks
  - CKV_DOCKER_1  # USER instruction
  - CKV_DOCKER_2  # HEALTHCHECK instruction
  - CKV_DOCKER_3  # No ADD instruction
  - CKV_DOCKER_7  # No latest tag
  - CKV_DOCKER_8  # No root USER

soft-fail-on:
  - CKV_K8S_21    # Default namespace (initial deployment)

compact: true
quiet: true
