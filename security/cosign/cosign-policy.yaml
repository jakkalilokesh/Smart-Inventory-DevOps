# =============================================================================
# Cosign Image Signing Policy - Supply Chain Security
# =============================================================================
# Purpose: Define the policy for container image signing and verification.
#          Ensures only signed and verified images are deployed to production.
# Integration: After Trivy scan and SBOM generation, Cosign signs the Docker
#              image with a cryptographic key. Kyverno policies in the cluster
#              verify the signature before allowing pod creation.
# Supply Chain: Implements SLSA Level 2+ provenance by signing images and
#               attaching SBOM attestations to the container image.
# =============================================================================

# -- Signing Configuration --
signing:
  # Key-based signing (keyless signing via Fulcio/Rekor is also supported)
  # In production, use a KMS-backed key (AWS KMS, HashiCorp Vault)
  method: "key"

  # Key storage configuration
  key:
    # For Jenkins CI/CD, the private key is stored as a Jenkins credential
    # and referenced via COSIGN_KEY environment variable
    # NEVER store the private key in the repository
    jenkins_credential_id: "cosign-private-key"

    # For AWS KMS integration (recommended for production):
    # kms_key_uri: "awskms:///arn:aws:kms:us-east-2:ACCOUNT_ID:key/KEY_ID"

  # Annotations to attach to the signed image
  annotations:
    # Build provenance metadata
    "build.pipeline": "jenkins"
    "build.project": "smartinventory"
    "build.repository": "https://github.com/jakkalilokesh/Smart-Inventory-DevOps"

    # Security scan results summary
    "security.trivy-scan": "passed"
    "security.sbom-format": "cyclonedx-json"
    "security.gitleaks-scan": "passed"
    "security.semgrep-scan": "passed"

# -- Verification Configuration --
verification:
  # Public key for verifying signatures
  # This key is distributed to all Kubernetes clusters
  public_key_secret: "cosign-public-key"

  # Kubernetes namespace where the public key secret is stored
  namespace: "cosign-system"

  # Verification policy
  policy:
    # Require signature verification for all images
    require_signature: true

    # Require SBOM attestation
    require_sbom_attestation: true

    # Allowed image registries (only signed images from these registries)
    allowed_registries:
      - "harbor.smartinventory.com"
      - "harbor.smartinventory.com/smartinventory"

    # Reject unsigned images
    reject_unsigned: true

# -- Attestation Configuration --
attestation:
  # Types of attestations to attach to signed images
  types:
    # SBOM attestation (generated by Syft)
    - type: "cyclonedx"
      source: "sbom.cdx.json"
      description: "Software Bill of Materials in CycloneDX format"

    # Vulnerability scan attestation (generated by Trivy)
    - type: "vuln"
      source: "trivy-report.json"
      description: "Trivy vulnerability scan results"

# -- Pipeline Commands Reference --
# These commands are used in the Jenkinsfile:
#
# 1. Generate key pair (one-time setup):
#    cosign generate-key-pair
#
# 2. Sign an image:
#    cosign sign --key env://COSIGN_KEY \
#      --annotations "build.number=${BUILD_NUMBER}" \
#      --annotations "build.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
#      harbor.smartinventory.com/smartinventory/smartinventory:${TAG}
#
# 3. Attach SBOM attestation:
#    cosign attest --key env://COSIGN_KEY \
#      --predicate sbom.cdx.json \
#      --type cyclonedx \
#      harbor.smartinventory.com/smartinventory/smartinventory:${TAG}
#
# 4. Verify image signature:
#    cosign verify --key cosign.pub \
#      harbor.smartinventory.com/smartinventory/smartinventory:${TAG}
#
# 5. Verify SBOM attestation:
#    cosign verify-attestation --key cosign.pub \
#      --type cyclonedx \
#      harbor.smartinventory.com/smartinventory/smartinventory:${TAG}
