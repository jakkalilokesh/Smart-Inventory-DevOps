# =============================================================================
# Trivy Configuration - Enterprise Container & Filesystem Security Scanner
# =============================================================================
# Purpose: Scan Docker images and filesystem for OS package vulnerabilities,
#          application dependency vulnerabilities, misconfigurations,
#          embedded secrets, and license compliance issues.
# Integration: Runs after Docker Build in the Jenkins pipeline. Scans the
#              built container image before it is signed and pushed to Harbor.
# Fail Criteria: Any CRITICAL vulnerability fails the build. HIGH
#                vulnerabilities generate warnings but allow continuation
#                with security team notification.
# =============================================================================

# -- Scan Configuration --
scan:
  # Enable parallel scanning for faster execution
  parallel: 4
  # Skip directories that are not relevant to security scanning
  skip-dirs:
    - "node_modules"
    - ".git"
    - ".terraform"
    - "target/surefire-reports"
    - ".gradle"
  # Skip specific files from scanning
  skip-files:
    - "package-lock.json"
    - "yarn.lock"

# -- Vulnerability Scanning Configuration --
vulnerability:
  # Types of vulnerabilities to detect
  type:
    - os        # Operating system package vulnerabilities (CVEs)
    - library   # Application library/dependency vulnerabilities
  # Ignore unfixed vulnerabilities (optional - set to false for strictest mode)
  ignore-unfixed: false
  # Severity levels to report
  severity:
    - UNKNOWN
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL

# -- Secret Detection Configuration --
secret:
  # Enable built-in secret detection in container layers
  config: {}

# -- Misconfiguration Scanning --
misconfiguration:
  # Scan for Dockerfile and Kubernetes misconfigurations
  type:
    - dockerfile
    - kubernetes

# -- Image Scanning Specific Options --
image:
  # Remove temporary files after scanning
  removed-pkgs: true
  # Scan input from Docker daemon
  input: []

# -- Database Configuration --
db:
  # Skip database update if recently updated (within 24 hours)
  skip-update: false
  # Download vulnerability database from OCI registry
  repository: "ghcr.io/aquasecurity/trivy-db"
  # Java-specific vulnerability database
  java-repository: "ghcr.io/aquasecurity/trivy-java-db"

# -- Cache Configuration --
cache:
  # Cache directory for vulnerability database
  dir: "/tmp/trivy-cache"
  # Time-to-live for cache entries
  ttl: "24h"

# -- Report Configuration --
output:
  # Default output format (overridden per-stage in Jenkinsfile)
  format: "json"
  # Include package information in reports
  list-all-pkgs: true

# -- Severity-Based Exit Codes for CI/CD Pipeline Integration --
# Exit code 0 = no vulnerabilities of specified severity
# Exit code 1 = vulnerabilities found at specified severity
# In the Jenkins pipeline, we run Trivy twice:
#   1. --exit-code 1 --severity CRITICAL  → Fails the build
#   2. --exit-code 0 --severity HIGH      → Reports only (warning)
