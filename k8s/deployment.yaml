apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartinventory-app
  labels:
    app: smartinventory
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smartinventory
      tier: backend
  template:
    metadata:
      labels:
        app: smartinventory
        tier: backend
    spec:
      containers:
      - name: smartinventory
        image: ghcr.io/jakkalilokesh/Smart-Inventory-DevOps:04c842a4a141eb4a88a5d4c6889b7e1592dad284
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: smartinventory-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: smartinventory-config
              key: db.port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: smartinventory-config
              key: db.name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: smartinventory-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartinventory-secrets
              key: db.password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: smartinventory
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartinventory
      tier: database
  template:
    metadata:
      labels:
        app: smartinventory
        tier: database
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartinventory-secrets
              key: mysql.root.password
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: smartinventory-config
              key: db.name
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: smartinventory-secrets
              key: db.user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartinventory-secrets
              key: db.password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
