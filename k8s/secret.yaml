apiVersion: v1
kind: Secret
metadata:
  name: smartinventory-secrets
type: Opaque
data:
  # Base64 encoded values - to be injected by CI/CD pipeline or vault
  # Example: echo -n 'your-value' | base64
  db.user: "${DB_USER_BASE64}"
  db.password: "${DB_PASSWORD_BASE64}"
  mysql.root.password: "${MYSQL_ROOT_PASSWORD_BASE64}"
