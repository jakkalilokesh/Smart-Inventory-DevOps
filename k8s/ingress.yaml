apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartinventory-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - smartinventory.example.com
    secretName: smartinventory-tls
  rules:
  - host: smartinventory.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartinventory-service
            port:
              number: 80
