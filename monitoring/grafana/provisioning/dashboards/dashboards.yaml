# =============================================================================
# Grafana Dashboards Provisioning Configuration
# =============================================================================
apiVersion: 1

providers:
  - name: 'SmartInventory Dashboards'
    orgId: 1
    folder: 'SmartInventory'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
